<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Simuladores — 5LD</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    #estado-refresh {
      font-size: 12px;
      color: #64748b;
    }

    #contador {
      font-size: 12px;
      color: #22c55e;
      margin-left: 8px;
    }

    .resumen {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat {
      background: #1e2330;
      border: 1px solid #2d3348;
      border-radius: 10px;
      padding: 14px 16px;
    }

    .stat-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .stat-valor {
      font-size: 26px;
      font-weight: 600;
    }

    .stat-valor.verde  { color: #22c55e; }
    .stat-valor.amarillo { color: #f59e0b; }
    .stat-valor.azul   { color: #60a5fa; }
    .stat-valor.lila   { color: #a78bfa; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1e2330;
      border: 1px solid #2d3348;
      border-radius: 12px;
      padding: 18px 20px;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: #475569; }

    .card.pendiente { border-left: 3px solid #f59e0b; }
    .card.listo     { border-left: 3px solid #22c55e; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .card-nombre {
      font-size: 14px;
      font-weight: 600;
      color: #f1f5f9;
      line-height: 1.3;
      max-width: 200px;
    }

    .badges {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .badge.ep   { background: #1e3a5f; color: #60a5fa; }
    .badge.glep { background: #3b1f5e; color: #a78bfa; }

    .badge.estado-listo    { background: #14532d; color: #4ade80; }
    .badge.estado-pendiente { background: #451a03; color: #fb923c; }
    .badge.estado-otro     { background: #1e293b; color: #94a3b8; }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .info-item { }

    .info-label {
      font-size: 10px;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 2px;
    }

    .info-valor {
      font-size: 13px;
      color: #cbd5e1;
      font-weight: 500;
    }

    .estados {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .etapa {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid #2d3348;
      color: #64748b;
    }

    .etapa.ok {
      background: #14532d22;
      border-color: #166534;
      color: #4ade80;
    }

    .btn-dhl {
      display: block;
      width: 100%;
      text-align: center;
      padding: 9px;
      background: #1e3a5f;
      color: #60a5fa;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }

    .btn-dhl:hover { background: #1e4a7a; }

    #loading {
      text-align: center;
      padding: 60px;
      color: #475569;
      font-size: 14px;
    }

    #error {
      display: none;
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      padding: 14px 18px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 13px;
    }
  </style>
</head>
<body>

<header>
  <h1>📦 Panel Simuladores — 5LD</h1>
  <div>
    <span id="estado-refresh">Actualizando...</span>
    <span id="contador"></span>
  </div>
</header>

<div id="error"></div>

<div class="resumen" id="resumen"></div>

<div id="loading">Cargando simuladores...</div>
<div class="grid" id="grid"></div>

<script>
  // ⚠️ REEMPLAZÁ CON TU URL DE APPS SCRIPT
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNGrcoyHa7Lqd-0tADkwdgbhL5upWDBBrG6EjWaRtAj-g_hBimm310BX6CwkDygns/exec";

  const REFRESH_SECONDS = 30;
  let countdown = REFRESH_SECONDS;

  function estadoBadgeClass(estado) {
    if (!estado || estado === "-") return "estado-otro";
    const e = estado.toLowerCase();
    if (e.includes("listo") || e.includes("ok") || e.includes("done")) return "estado-listo";
    if (e.includes("pendiente") || e === "") return "estado-pendiente";
    return "estado-otro";
  }

  function etapaOk(val) {
    if (!val) return false;
    const v = val.toLowerCase();
    return v.includes("listo") || v.includes("ok") || v.includes("done");
  }

  function renderResumen(data) {
    const total    = data.length;
    const ep       = data.filter(d => d.tipo === "EP").length;
    const glep     = data.filter(d => d.tipo === "GLEP").length;
    const pendiente = data.filter(d => !etapaOk(d.ingreso)).length;

    document.getElementById("resumen").innerHTML = `
      <div class="stat">
        <div class="stat-label">Total activos</div>
        <div class="stat-valor azul">${total}</div>
      </div>
      <div class="stat">
        <div class="stat-label">EP</div>
        <div class="stat-valor azul">${ep}</div>
      </div>
      <div class="stat">
        <div class="stat-label">GLEP</div>
        <div class="stat-valor lila">${glep}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Ingreso pendiente</div>
        <div class="stat-valor amarillo">${pendiente}</div>
      </div>
    `;
  }

  function renderCards(data) {
    if (data.length === 0) {
      document.getElementById("grid").innerHTML =
        `<p style="color:#475569;font-size:14px">No hay simuladores con seguimiento DHL activo.</p>`;
      return;
    }

    document.getElementById("grid").innerHTML = data.map(d => {
      const ingresoOk = etapaOk(d.ingreso);
      const cardClass = ingresoOk ? "listo" : "pendiente";
      const tipoClass = d.tipo === "GLEP" ? "glep" : "ep";

      return `
        <div class="card ${cardClass}">
          <div class="card-header">
            <div class="card-nombre">${d.nombre}</div>
            <div class="badges">
              <span class="badge ${tipoClass}">${d.tipo}</span>
              <span class="badge ${estadoBadgeClass(d.ingreso)}">${d.ingreso || "Pendiente"}</span>
            </div>
          </div>

          <div class="info-grid">
            <div class="info-item">
              <div class="info-label">Fecha inicio</div>
              <div class="info-valor">${d.fechaInicio}</div>
            </div>
            <div class="info-item">
              <div class="info-label">Tracking</div>
              <div class="info-valor" style="font-size:11px;word-break:break-all">${d.tracking}</div>
            </div>
          </div>

          <div class="estados">
            <span class="etapa ${etapaOk(d.shipping) ? "ok" : ""}">Shipping</span>
            <span class="etapa ${etapaOk(d.comInv) ? "ok" : ""}">Com/Inv</span>
            <span class="etapa ${ingresoOk ? "ok" : ""}">Ingreso</span>
          </div>

          <a class="btn-dhl" href="${d.linkDHL}" target="_blank">
            Ver seguimiento DHL →
          </a>
        </div>
      `;
    }).join("");
  }

  async function cargarDatos() {
    try {
      document.getElementById("error").style.display = "none";
      const res = await fetch(APPS_SCRIPT_URL);
      const data = await res.json();

      document.getElementById("loading").style.display = "none";
      renderResumen(data);
      renderCards(data);

      const ahora = new Date().toLocaleTimeString("es-AR");
      document.getElementById("estado-refresh").textContent = `Actualizado ${ahora}`;
    } catch (err) {
      document.getElementById("error").style.display = "block";
      document.getElementById("error").textContent =
        "Error al conectar con el servidor. Reintentando en " + REFRESH_SECONDS + "s...";
      document.getElementById("loading").style.display = "none";
    }
  }

  // Auto-refresh con countdown
  function tick() {
    countdown--;
    document.getElementById("contador").textContent = `· ${countdown}s`;
    if (countdown <= 0) {
      countdown = REFRESH_SECONDS;
      cargarDatos();
    }
  }

  cargarDatos();
  setInterval(tick, 1000);
</script>
</body>
</html>
