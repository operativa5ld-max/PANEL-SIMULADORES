<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Ingresos Courier — 5LD</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fdf8ee;
      color: #2d2a1e;
      min-height: 100vh;
      padding: 20px 24px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a0e;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot-live {
      width: 7px; height: 7px;
      background: #e6a817;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    #estado-refresh { font-size: 11px; color: #8a7a50; }
    #contador { font-size: 11px; color: #c4920a; margin-left: 6px; }

    .resumen {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }
    .stat {
      background: #fff8e1;
      border: 0.5px solid #e6c96a;
      border-radius: 8px;
      padding: 12px 14px;
    }
    .stat-label { font-size: 10px; color: #8a7a50; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .stat-valor { font-size: 24px; font-weight: 700; }
    .stat-valor.dorado  { color: #c4920a; }
    .stat-valor.naranja { color: #d97706; }
    .stat-valor.verde   { color: #2d7a3a; }
    .stat-valor.oscuro  { color: #1a1a0e; }

    .buscador-wrap { margin-bottom: 14px; }
    .buscador-wrap input {
      width: 100%;
      padding: 9px 14px;
      border-radius: 8px;
      border: 0.5px solid #e6c96a;
      background: #fff8e1;
      color: #3d2e00;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    .buscador-wrap input:focus { border-color: #c4920a; }

    .filtros { display: flex; gap: 7px; margin-bottom: 18px; flex-wrap: wrap; }
    .filtro {
      font-size: 11px; padding: 4px 14px;
      border-radius: 20px; border: 0.5px solid #e6c96a;
      color: #8a7a50; background: #fff8e1; cursor: pointer; transition: all .15s;
    }
    .filtro.activo { background: #f0c020; border-color: #c4920a; color: #3d2e00; font-weight: 600; }

    .seccion-titulo {
      font-size: 11px;
      color: #8a7a50;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 10px;
      margin-top: 18px;
      padding-bottom: 6px;
      border-bottom: 0.5px solid #e6c96a;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .card {
      background: #fffdf5;
      border: 0.5px solid #e6c96a;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .2s;
    }
    .card:hover { border-color: #c4920a; }
    .card.pendiente { border-left: 3px solid #d97706; border-radius: 0 10px 10px 0; }
    .card.en-camino { border-left: 3px solid #2563eb; border-radius: 0 10px 10px 0; }
    .card.listo     { border-left: 3px solid #2d7a3a; border-radius: 0 10px 10px 0; }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-titulo { font-size: 13px; font-weight: 700; color: #1a1a0e; line-height: 1.3; }
    .card-subtitulo { font-size: 10px; color: #8a7a50; margin-top: 2px; }

    .badges { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; flex-shrink: 0; margin-left: 8px; }
    .badge {
      font-size: 9px; font-weight: 700; padding: 2px 7px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap;
    }
    .badge.ep   { background: #fff3cd; color: #854d0e; border: 0.5px solid #f0c020; }
    .badge.glep { background: #fde68a; color: #451a03; border: 0.5px solid #d97706; }
    .badge.estado-listo     { background: #dcfce7; color: #166534; border: 0.5px solid #86efac; }
    .badge.estado-pendiente { background: #ffedd5; color: #9a3412; border: 0.5px solid #fdba74; }
    .badge.estado-camino    { background: #dbeafe; color: #1e40af; border: 0.5px solid #93c5fd; }
    .badge.estado-otro      { background: #f5f0e0; color: #8a7a50; border: 0.5px solid #e6c96a; }

    .info-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .info-label { font-size: 9px; color: #8a7a50; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 2px; }
    .info-valor { font-size: 11px; color: #3d2e00; font-weight: 600; word-break: break-all; }
    .info-valor.destacado { color: #c4920a; }

    .etapas { display: flex; gap: 4px; flex-wrap: wrap; }
    .etapa {
      font-size: 9px; padding: 2px 6px;
      border-radius: 3px; border: 0.5px solid #e6c96a; color: #8a7a50; background: #fff8e1;
    }
    .etapa.ok  { background: #dcfce7; border-color: #86efac; color: #166534; }
    .etapa.act { background: #dbeafe; border-color: #93c5fd; color: #1e40af; }

    .btn-dhl {
      display: block; width: 100%; text-align: center;
      padding: 8px; background: #f0c020; color: #3d2e00;
      border-radius: 6px; text-decoration: none; font-size: 11px; font-weight: 700;
      border: 0.5px solid #c4920a; transition: background .15s; margin-top: auto;
    }
    .btn-dhl:hover { background: #e6b800; }
    .btn-dhl-disabled {
      display: block; width: 100%; text-align: center;
      padding: 8px; background: #f5f0e0; color: #c9b97a;
      border-radius: 6px; font-size: 11px;
      border: 0.5px solid #e6c96a; margin-top: auto;
    }

    #loading { text-align: center; padding: 60px; color: #8a7a50; font-size: 14px; }
    #error {
      display: none; background: #fff0e0; border: 0.5px solid #f59e0b;
      color: #92400e; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px;
    }
    .vacio { color: #8a7a50; font-size: 13px; padding: 16px 0; }
    .ml-badge {
      background: #f0c020; color: #3d2e00;
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 4px;
    }
  </style>
</head>
<body>

<header>
  <h1>
    <span class="dot-live"></span>
    Panel Ingresos Courier — 5LD
    <span class="ml-badge">DHL</span>
  </h1>
  <div>
    <span id="estado-refresh">Cargando...</span>
    <span id="contador"></span>
  </div>
</header>

<div id="error"></div>
<div class="resumen" id="resumen"></div>

<div class="buscador-wrap">
  <input
    type="text"
    id="buscador"
    placeholder="Buscar pedido... (ej: EP0044, GLEP42)"
    oninput="buscar(this.value)"
  >
</div>

<div class="filtros">
  <button class="filtro activo" onclick="setFiltro('todos',this)">Todos</button>
  <button class="filtro" onclick="setFiltro('EP',this)">EP</button>
  <button class="filtro" onclick="setFiltro('GLEP',this)">GLEP</button>
  <button class="filtro" onclick="setFiltro('pendiente',this)">Ingreso pendiente</button>
  <button class="filtro" onclick="setFiltro('listo',this)">Ingresados</button>
</div>

<div id="loading">Cargando simuladores...</div>
<div id="contenido"></div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyT2k-LtPA5Vz5eJqN35UXLJdnFVSCYItyjojTo4SHnRrPI9U0FP_jvckRT4r7YH0E/exec";
  const REFRESH_SECONDS = 30;
  let countdown = REFRESH_SECONDS;
  let todosLosDatos = [];
  let filtroActual = "todos";

  function etapaOk(v)     { if (!v) return false; const s = v.toLowerCase(); return s.includes("listo") || s.includes("ok") || s.includes("done"); }
  function etapaActiva(v) { if (!v) return false; const s = v.toLowerCase(); return s.includes("proceso") || s.includes("camino") || s.includes("en curso"); }

  function estadoBadgeClass(estado) {
    if (!estado || estado === "-") return "estado-otro";
    const e = estado.toLowerCase();
    if (e.includes("listo") || e.includes("ok")) return "estado-listo";
    if (e.includes("proceso") || e.includes("camino")) return "estado-camino";
    if (e.includes("pendiente")) return "estado-pendiente";
    return "estado-otro";
  }

  function numPedido(nombre) {
    const m = nombre.match(/\d+/);
    return m ? parseInt(m[0]) : 0;
  }

  function setFiltro(f, btn) {
    filtroActual = f;
    document.querySelectorAll(".filtro").forEach(b => b.classList.remove("activo"));
    btn.classList.add("activo");
    document.getElementById("buscador").value = "";
    renderContenido(todosLosDatos);
  }

  function filtrar(data) {
    if (filtroActual === "EP") return data.filter(d => d.tipo === "EP");
    if (filtroActual === "GLEP") return data.filter(d => d.tipo === "GLEP");
    if (filtroActual === "pendiente") return data.filter(d => !etapaOk(d.ingreso));
    if (filtroActual === "listo") return data.filter(d => etapaOk(d.ingreso));
    return data;
  }

  function buscar(texto) {
    const t = texto.toLowerCase().trim();
    if (!t) {
      renderContenido(todosLosDatos);
      return;
    }
    const filtrados = todosLosDatos.filter(d =>
      d.pedido.toLowerCase().includes(t) ||
      d.nombre.toLowerCase().includes(t) ||
      d.tracking.toLowerCase().includes(t)
    );
    const contenedor = document.getElementById("contenido");
    if (filtrados.length === 0) {
      contenedor.innerHTML = `<p class="vacio">No se encontró ningún pedido con ese nombre.</p>`;
      return;
    }
    contenedor.innerHTML = `
      <div class="seccion-titulo">${filtrados.length} resultado${filtrados.length > 1 ? 's' : ''} para "${texto}"</div>
      <div class="grid">${filtrados.map(cardHTML).join("")}</div>
    `;
  }

  function renderResumen(data) {
    document.getElementById("resumen").innerHTML = `
      <div class="stat"><div class="stat-label">Total pedidos</div><div class="stat-valor oscuro">${data.length}</div></div>
      <div class="stat"><div class="stat-label">EP</div><div class="stat-valor dorado">${data.filter(d=>d.tipo==="EP").length}</div></div>
      <div class="stat"><div class="stat-label">GLEP</div><div class="stat-valor naranja">${data.filter(d=>d.tipo==="GLEP").length}</div></div>
      <div class="stat"><div class="stat-label">Ingreso pendiente</div><div class="stat-valor naranja">${data.filter(d=>!etapaOk(d.ingreso)).length}</div></div>
    `;
  }

  function cardHTML(d) {
    const ingresoOk = etapaOk(d.ingreso);
    const enCamino  = !ingresoOk && (etapaActiva(d.shipping) || etapaActiva(d.comInv));
    const cardClass = ingresoOk ? "listo" : enCamino ? "en-camino" : "pendiente";
    const tipoClass = d.tipo === "GLEP" ? "glep" : "ep";
    const fechaEstim = d.fechaEstimada && d.fechaEstimada !== "-" ? d.fechaEstimada : "Sin fecha";

    return `
      <div class="card ${cardClass}">
        <div class="card-top">
          <div>
            <div class="card-titulo">${d.pedido}</div>
            <div class="card-subtitulo">${d.nombre}</div>
          </div>
          <div class="badges">
            <span class="badge ${tipoClass}">${d.tipo}</span>
            <span class="badge ${estadoBadgeClass(d.ingreso)}">${d.ingreso === "Pendiente" ? "Pendiente" : d.ingreso}</span>
          </div>
        </div>
        <div class="info-row-3">
          <div>
            <div class="info-label">Inicio</div>
            <div class="info-valor">${d.fechaInicio}</div>
          </div>
          <div>
            <div class="info-label">Est. ingreso</div>
            <div class="info-valor destacado">${fechaEstim}</div>
          </div>
          <div>
            <div class="info-label">Tracking</div>
            <div class="info-valor">${d.tracking}</div>
          </div>
        </div>
        <div class="etapas">
          <span class="etapa ${etapaOk(d.simulacion)?'ok':etapaActiva(d.simulacion)?'act':''}">Simulación</span>
          <span class="etapa ${etapaOk(d.cotizar)?'ok':etapaActiva(d.cotizar)?'act':''}">Cotizar</span>
          <span class="etapa ${etapaOk(d.consolidar)?'ok':etapaActiva(d.consolidar)?'act':''}">Consolidar</span>
          <span class="etapa ${etapaOk(d.shipping)?'ok':etapaActiva(d.shipping)?'act':''}">Shipping</span>
          <span class="etapa ${etapaOk(d.comInv)?'ok':etapaActiva(d.comInv)?'act':''}">Com/Inv</span>
          <span class="etapa ${ingresoOk?'ok':''}">Ingreso</span>
        </div>
        ${d.linkDHL
          ? `<a class="btn-dhl" href="${d.linkDHL}" target="_blank">Ver seguimiento DHL →</a>`
          : `<div class="btn-dhl-disabled">Sin tracking cargado</div>`
        }
      </div>`;
  }

  function renderContenido(data) {
    const filtrados = filtrar(data);
    const contenedor = document.getElementById("contenido");

    if (filtrados.length === 0) {
      contenedor.innerHTML = `<p class="vacio">No hay pedidos para mostrar.</p>`;
      return;
    }

    const gleps = filtrados.filter(d => d.tipo === "GLEP").sort((a,b) => numPedido(a.pedido) - numPedido(b.pedido));
    const eps   = filtrados.filter(d => d.tipo === "EP").sort((a,b) => numPedido(a.pedido) - numPedido(b.pedido));

    let html = "";
    if (gleps.length > 0) {
      html += `<div class="seccion-titulo">GLEP — ${gleps.length} pedidos</div>`;
      html += `<div class="grid">${gleps.map(cardHTML).join("")}</div>`;
    }
    if (eps.length > 0) {
      html += `<div class="seccion-titulo">EP — ${eps.length} pedidos</div>`;
      html += `<div class="grid">${eps.map(cardHTML).join("")}</div>`;
    }
    contenedor.innerHTML = html;
  }

  async function cargarDatos() {
    try {
      document.getElementById("error").style.display = "none";
      const res = await fetch(APPS_SCRIPT_URL);
      todosLosDatos = await res.json();
      document.getElementById("loading").style.display = "none";
      renderResumen(todosLosDatos);
      renderContenido(todosLosDatos);
      document.getElementById("estado-refresh").textContent = `Actualizado ${new Date().toLocaleTimeString("es-AR")}`;
    } catch (err) {
      document.getElementById("error").style.display = "block";
      document.getElementById("error").textContent = "Error al conectar. Reintentando en " + countdown + "s...";
      document.getElementById("loading").style.display = "none";
    }
  }

  function tick() {
    countdown--;
    document.getElementById("contador").textContent = `· ${countdown}s`;
    if (countdown <= 0) { countdown = REFRESH_SECONDS; cargarDatos(); }
  }

  cargarDatos();
  setInterval(tick, 1000);
</script>
</body>
</html>
